version: "3.9"

services:
  media-cleaner-movies:
    image: ghcr.io/arnavy15/media-cleaner:latest
    container_name: media-cleaner-movies
    restart: unless-stopped
    environment:
      MEDIA_DIR: /data/movies
      STABLE_WAIT_SECONDS: "5"
      KEEP_ENGLISH_ONLY: "true"
      OVERWRITE_OUTPUT: "false"
      CONFIG_DIR: /config/movies
    volumes:
      - /your/server/config:/config
      - /your/server/data:/data

  media-cleaner-tv:
    image: ghcr.io/arnavy15/media-cleaner:latest
    container_name: media-cleaner-tv
    restart: unless-stopped
    environment:
      MEDIA_DIR: /data/tv
      STABLE_WAIT_SECONDS: "5"
      KEEP_ENGLISH_ONLY: "true"
      OVERWRITE_OUTPUT: "false"
      CONFIG_DIR: /config/tv
    volumes:
      - /your/server/config:/config
      - /your/server/data:/data
